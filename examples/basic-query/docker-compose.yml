services:
  spark-connect:
    # Apache Spark 4.0 — Connect server is bundled in the image
    image: apache/spark:4.0.0-preview2
    ports:
      - "15002:15002"
    command:
      - /opt/spark/sbin/start-connect-server.sh
    environment:
      - SPARK_NO_DAEMONIZE=true
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15002 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
