name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test:coverage
      - run: pnpm test:integration

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: packages/spark-core/coverage/lcov.info
          flags: spark-core
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: packages/spark-node/coverage/lcov.info
          flags: spark-node
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
